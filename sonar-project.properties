# SonarQube Configuration — ReservFlow
sonar.projectKey=reservflow
sonar.projectName=ReservFlow
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src
sonar.tests=src

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Exclusions from analysis
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/*.test.ts,**/*.spec.ts,**/database/**,**/docs/**

# Coverage report
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true
